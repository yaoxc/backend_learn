# dev 环境：本地/开发，端口 6004，context-path /market，Eureka 7421，本地 MySQL/Mongo/Kafka/Redis（约定见 README-配置约定.md）
server.port=6004
server.servlet.context-path=/market
spring.session.store-type=none
spring.application.name=bitrade-market

# 撮合服务在 Eureka 的 serviceId（通常为 spring.application.name 的大写形式）。
# 本地默认是 exchange 模块的 service-exchange -> Eureka 中一般显示为 SERVICE-EXCHANGE。
market.exchange.service-id=SERVICE-EXCHANGE

# EhCache（aqmd-netty 需要 EhCacheCacheManager Bean，使用 dev/ehcache.xml）
spring.cache.type=ehcache
spring.cache.ehcache.config=classpath:dev/ehcache.xml

# datasource（本地 MySQL；Boot 2.x + MySQL 8 使用 com.mysql.cj.jdbc.Driver）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bizzan?characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456

# jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=false
spring.jpa.show-sql=true
spring.data.jpa.repositories.enabled=true

# ========== MongoDB ==========
# 【改动】dev 环境连接本地 MongoDB。
# 【目的】与其他服务（wallet/market 等）保持一致，本机开发时统一走 localhost:27017，避免依赖 docker 内网域名 mongo。
# 连接串各部分含义：
# - mongodb://              协议，表示使用 MongoDB 驱动连接
# - admin:admin123@         认证用户名/密码（用户 admin，密码 admin123）
# - 127.0.0.1:27017         MongoDB 地址和端口，这里是本机默认端口 27017
# - /bizzan                 业务数据库名，等价于连接后执行 `use bizzan`
# - ?authSource=admin       指定认证库为 admin，表示去 admin 库校验 admin/admin123 这个账号
# spring.data.mongodb.uri=mongodb://admin:admin123@127.0.0.1:27017/bizzan?authSource=admin
spring.data.mongodb.uri=mongodb://root:123456@127.0.0.1:27017/bizzan?authSource=admin
spring.data.mongodb.database=bizzan


# kafka（本地 9092）
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.producer.retries=0
spring.kafka.producer.batch.size=256
spring.kafka.producer.linger=1
spring.kafka.producer.buffer.memory=1048576
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.session.timeout=15000
spring.kafka.consumer.auto.commit.interval=1000
spring.kafka.consumer.auto.offset.reset=earliest
spring.kafka.consumer.group.id=default-group
spring.kafka.consumer.concurrency=3
spring.kafka.consumer.maxPollRecordsConfig=50

# eureka（本地 7421）
eureka.client.service-url.default-zone=http://127.0.0.1:7421/eureka/
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7421/eureka/

second.referrer.award=false
match.result.use.fund.pipeline=true

######################################## hawk netty ########################################
aqmd.netty.port=28901
aqmd.netty.bossThreadSize=1
aqmd.netty.worker-thread-size=3
aqmd.netty.packetHeaderLength=4
aqmd.netty.max-frame-length=2147483647
aqmd.netty.writer-idle=200
aqmd.netty.max-timeout=60
aqmd.netty.defaultTimeout=30
aqmd.netty.deal-handler-thread-size=10
aqmd.netty.serviceLoggerLevel=debug
aqmd.netty.direct-access-flag=1
aqmd.netty.direct-access-command=20001,20002,20021,20022
aqmd.netty.websocket-flag=1
aqmd.netty.websocket-port=28985

# redis（本地；原 dev 中 spring.redis.host:redis 已改为 = 写法）
spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.pool.max-active=300
spring.redis.pool.max-wait=60000
spring.redis.pool.max-idle=100
spring.redis.pool.min-idle=20
spring.redis.timeout=30000
spring.redis.password=

# ES 占位（core ESConfig）
es.username=
es.password=
es.mine.index=
es.mine.type=
es.public.ip=127.0.0.1
es.private.ip=127.0.0.1
es.port=9200
