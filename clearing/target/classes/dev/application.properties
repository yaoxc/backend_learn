server.port=6005
spring.application.name=bitrade-clearing

# 与 market 共用同一库：clearing_result、exchange_order 等表
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql-db:3306/bizzan?characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=false
spring.jpa.show-sql=false
spring.data.jpa.repositories.enabled=true

# Kafka：消费 exchange-match-result（group=market-clearing-group），产出 exchange-clearing-result
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.retries=3
spring.kafka.producer.batch.size=16384
spring.kafka.producer.linger=1
spring.kafka.producer.buffer.memory=1048576
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.session.timeout=15000
spring.kafka.consumer.auto.commit.interval=1000
spring.kafka.consumer.group.id=market-clearing-group
spring.kafka.consumer.concurrency=3
spring.kafka.consumer.auto.offset.reset=earliest
spring.kafka.consumer.maxPollRecordsConfig=50

# 清算结果 topic 与重试间隔（毫秒）
clearing.result.topic=exchange-clearing-result
clearing.retry.interval=30000
