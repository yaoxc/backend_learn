# 修改说明：dev 环境，与 exchange-api 改造一致；端口 6002 避免与 clearing(6005) 冲突，见项目端口约定
server.port=6002
spring.application.name=service-exchange
spring.session.store-type=none

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# mongodb（本地可改为 127.0.0.1:27017）
spring.data.mongodb.uri=mongodb://admin:admin123@127.0.0.1:27017/bizzan?authSource=admin

# eureka（本地 7421，双写避免 8761）
eureka.client.service-url.default-zone=http://127.0.0.1:7421/eureka/
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7421/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true

# kafka（本地 127.0.0.1:9092）
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.producer.retries=0
spring.kafka.producer.batch.size=256
spring.kafka.producer.linger=1
spring.kafka.producer.buffer.memory=1048576
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.session.timeout=15000
spring.kafka.consumer.auto.commit.interval=100
spring.kafka.consumer.auto.offset.reset=earliest
spring.kafka.consumer.group.id=default-group
spring.kafka.consumer.concurrency=9
spring.kafka.consumer.maxPollRecordsConfig=50
spring.devtools.restart.enabled=true

# datasource（本地 127.0.0.1:3306）
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bizzan?characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.initialSize=5
spring.datasource.minIdle=5
spring.datasource.maxActive=200
spring.datasource.maxWait=60000
spring.datasource.timeBetweenEvictionRunsMillis=60000
spring.datasource.minEvictableIdleTimeMillis=300000
spring.datasource.validationQuery=SELECT 1
spring.datasource.testWhileIdle=true
spring.datasource.testOnBorrow=false
spring.datasource.testOnReturn=false
spring.datasource.poolPreparedStatements=true
spring.datasource.maxPoolPreparedStatementPerConnectionSize=20
spring.datasource.filters=stat,wall,log4j

# jpa
spring.jpa.show-sql=true
spring.data.jpa.repositories.enabled=true
spring.jpa.hibernate.ddl-auto=update

# ES
es.username=
es.password=
es.mine.index=
es.mine.type=
es.public.ip=
es.private.ip=#
es.port=9200
