# 修改说明：与 exchange-api 一致，多环境用 Spring Boot 约定；Eureka 写根配置且 kebab+camelCase 双写，避免客户端用默认 8761
spring.profiles.active=dev
eureka.client.service-url.default-zone=http://127.0.0.1:7421/eureka/
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7421/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Disruptor 接入撮合（可选）：为 true 时注册 MatchingOrderDisruptor；启用后请将 spring.kafka.consumer.concurrency 设为 1，避免多线程打乱分区顺序
