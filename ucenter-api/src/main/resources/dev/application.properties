# ========== 服务与应用 ==========
# 服务监听端口
server.port=6001
# Spring Boot 2.x：context-path 改为 server.servlet.context-path（原 server.context-path）
# 应用上下文路径，访问前缀为 /uc
server.servlet.context-path=/uc
# 应用名称，用于 Eureka 注册与识别
spring.application.name=uc
# 全局日志级别，debug 便于开发排查
logging.level.*=debug
# 本地未起 bitrade-market 时 LoadBalancer 会反复打 WARN「No servers available」，此处改为 ERROR 减少刷屏
logging.level.org.springframework.cloud.loadbalancer.core.RoundRobinLoadBalancer=ERROR

# ========== Eureka 与监控端点 ==========
# Eureka 注册中心地址（cloud 模块端口 7421，非默认 8761）；本地先启动 cloud 再启动本应用
# 2.x 使用 kebab-case；部分版本会读 camelCase，两个都写确保生效
eureka.client.service-url.default-zone=http://127.0.0.1:7421/eureka/
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7421/eureka/
# 注册到 Eureka 的实例展示名：默认为本机主机名（如 macbookpro），改为应用名+端口则显示为 uc:6001；若要用真实服务器名可设 eureka.instance.hostname=实际主机名
eureka.instance.instance-id=${spring.application.name}:${server.port}
# 暴露的 Actuator 端点，health 用于健康检查
management.endpoints.web.exposure.include=health
# 健康检查是否展示详细信息
management.endpoint.health.show-details=always

