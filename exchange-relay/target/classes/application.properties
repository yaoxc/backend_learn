server.port=6013
spring.application.name=service-exchange-relay
spring.session.store-type=none

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# eureka
# 2.x：service-url.default-zone（原 serviceUrl.defaultZone）
eureka.client.service-url.default-zone=http://cloud:7421/eureka/
eureka.instance.prefer-ip-address=true

# kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.retries=0
spring.kafka.producer.batch.size=256
spring.kafka.producer.linger=1
spring.kafka.producer.buffer.memory=1048576
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.session.timeout=15000
spring.kafka.consumer.auto.commit.interval=100
spring.kafka.consumer.auto.offset.reset=earliest
spring.kafka.consumer.group.id=exchange-relay-group
spring.kafka.consumer.concurrency=3
spring.kafka.consumer.maxPollRecordsConfig=200

# relay topics
relay.order.ingress-topic=exchange-order-ingress
relay.order.cancel-ingress-topic=exchange-order-cancel-ingress
relay.order.internal-topic=exchange-order
relay.order.internal-cancel-topic=exchange-order-cancel

