# Spring Boot 多环境约定：公共配置 + 默认激活 profile；环境专用在 application-{profile}.properties，见 README-配置约定.md
spring.profiles.active=dev
# Eureka 写在根配置，kebab 与 camelCase 双写，避免客户端退回到默认 8761（与 exchange-api 一致）
eureka.client.service-url.default-zone=http://127.0.0.1:7421/eureka/
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7421/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}
