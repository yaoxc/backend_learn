# dev 环境：本地/开发，端口 6013，Eureka 7421，本地 MySQL/Redis/Kafka（约定见 README-配置约定.md）
server.port=6013
spring.application.name=service-exchange-relay
spring.session.store-type=none

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# datasource（core 带 JPA；本地与 exchange-api 一致）
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bizzan?characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# eureka（本地 7421；kebab 与 camelCase 根配置已写，此处可覆盖）
eureka.client.service-url.default-zone=http://127.0.0.1:7421/eureka/
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7421/eureka/
eureka.instance.prefer-ip-address=true

# kafka（本地 9092）
spring.kafka.bootstrap-servers=127.0.0.1:9092
# ES（core ESConfig 占位；本地不用可留空）
es.username=
es.password=
es.mine.index=
es.mine.type=
es.public.ip=127.0.0.1
es.private.ip=127.0.0.1
es.port=9200

spring.kafka.producer.retries=0
spring.kafka.producer.batch.size=256
spring.kafka.producer.linger=1
spring.kafka.producer.buffer.memory=1048576
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.session.timeout=15000
spring.kafka.consumer.auto.commit.interval=100
spring.kafka.consumer.auto.offset.reset=earliest
spring.kafka.consumer.group.id=service-exchange-relay
spring.kafka.consumer.concurrency=3
spring.kafka.consumer.maxPollRecordsConfig=200

# relay 消费者组（按“职责”拆分：下单入口 / 撤单入口）
relay.kafka.group.order=service-exchange-relay-order-ingress
relay.kafka.group.cancel=service-exchange-relay-cancel-ingress

relay.order.ingress-topic=exchange-order-ingress
relay.order.cancel-ingress-topic=exchange-order-cancel-ingress
relay.order.internal-topic=exchange-order
relay.order.internal-cancel-topic=exchange-order-cancel
