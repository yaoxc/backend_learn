server.port=6007
spring.application.name=bitrade-fund

# 与 market 共用同一库：processed_fund_instruction、member_wallet 等表
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql-db:3306/bizzan?characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=false
spring.jpa.show-sql=false
spring.data.jpa.repositories.enabled=true

# Kafka：消费 exchange-fund-instruction（仅消费者，无生产者）
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.session.timeout=15000
spring.kafka.consumer.auto.commit.interval=1000
spring.kafka.consumer.group.id=market-fund-group
spring.kafka.consumer.concurrency=3
spring.kafka.consumer.auto.offset.reset=earliest
spring.kafka.consumer.maxPollRecordsConfig=50

# 资金指令重试间隔（毫秒）、平台账户 memberId（与结算一致，用于 FEE_REVENUE）
fund.instruction.retry.interval=30000
settlement.platform.memberId=0
