# Spring Boot 多环境约定：公共配置 + 默认激活 profile；环境专用配置在 application-{profile}.properties 中，见 README-配置约定.md
spring.profiles.active=dev
# 修改说明：Eureka 必须写在根配置；同时写 kebab-case 与 camelCase，因 Netflix 客户端部分逻辑只认 serviceUrl.defaultZone，否则会退回到默认 8761
# 修改说明：Eureka 客户端初始化得很早，有时在 application-dev.properties 加载之前就用上了配置，这时就会用 Spring Cloud 的默认 8761，导致连不上。所以在根目录的 application.properties配置一遍
eureka.client.service-url.default-zone=http://127.0.0.1:7421/eureka/
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7421/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}
