# prod 环境：生产，请按实际部署修改以下地址与密码（约定见 README-配置约定.md）
server.port=6003
spring.application.name=service-exchange-api
server.servlet.context-path=/exchange

spring.redis.host=redis
spring.redis.port=6379
spring.redis.password=

spring.datasource.url=jdbc:mysql://mysql-db:3306/bizzan?characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource

spring.kafka.bootstrap-servers=kafka:9092
spring.data.mongodb.uri=mongodb://admin:admin123@mongo:27017/bizzan?authSource=admin
eureka.client.service-url.default-zone=http://cloud:7421/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}
