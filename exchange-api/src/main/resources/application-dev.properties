# dev 环境：本地/开发，端口 6003，Eureka 7421，本地 MySQL/Redis/Kafka（约定见 README-配置约定.md）
server.port=6003
spring.application.name=service-exchange-api
server.servlet.context-path=/exchange

#redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.pool.max-active=300
spring.redis.pool.max-wait=60000
spring.redis.pool.max-idle=100
spring.redis.pool.min-idle=20
spring.redis.timeout=30000
spring.redis.password=Magician8421

# ========== MongoDB ==========
# 【改动】dev 环境连接本地 MongoDB。
# 【目的】与其他服务（wallet/market 等）保持一致，本机开发时统一走 localhost:27017，避免依赖 docker 内网域名 mongo。
# 连接串各部分含义：
# - mongodb://              协议，表示使用 MongoDB 驱动连接
# - admin:admin123@         认证用户名/密码（用户 admin，密码 admin123）
# - 127.0.0.1:27017         MongoDB 地址和端口，这里是本机默认端口 27017
# - /bizzan                 业务数据库名，等价于连接后执行 `use bizzan`
# - ?authSource=admin       指定认证库为 admin，表示去 admin 库校验 admin/admin123 这个账号
# spring.data.mongodb.uri=mongodb://admin:admin123@127.0.0.1:27017/bizzan?authSource=admin
spring.data.mongodb.uri=mongodb://root:123456@127.0.0.1:27017/bizzan?authSource=admin
spring.data.mongodb.database=bizzan


# kafka（改造：topic 由 core KafkaTopicInitializer 自动检查/创建，已有打「已有不需要创建」，没有打「没有已自动创建」）
spring.kafka.bootstrap-servers=127.0.0.1:9092
kafka.topics.ensure=exchange-order-ingress,exchange-order-cancel-ingress,exchange-order-cancel
spring.kafka.producer.retries=0
spring.kafka.producer.batch.size=256
spring.kafka.producer.linger=1
spring.kafka.producer.buffer.memory=1048576
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.session.timeout=15000
spring.kafka.consumer.auto.commit.interval=100
spring.kafka.consumer.auto.offset.reset=earliest
spring.kafka.consumer.group.id=default-group
spring.kafka.consumer.concurrency=9
spring.kafka.consumer.maxPollRecordsConfig=50
spring.devtools.restart.enabled=true

exchange.relay.order.ingress-topic=exchange-order-ingress
exchange.relay.order.cancel-ingress-topic=exchange-order-cancel-ingress
# 消费 exchange-match-result 更新订单状态，避免「资金已入账但订单仍 TRADING」。true=启用（默认），false=仅依赖 market 更新
exchange.order.status.sync.enabled=true

#datasource
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bizzan?characterEncoding=utf-8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.initialSize=5
spring.datasource.minIdle=5
spring.datasource.maxActive=200
spring.datasource.maxWait=60000
spring.datasource.timeBetweenEvictionRunsMillis=60000
spring.datasource.minEvictableIdleTimeMillis=300000
spring.datasource.validationQuery=SELECT 1
spring.datasource.testWhileIdle=true
spring.datasource.testOnBorrow=false
spring.datasource.testOnReturn=false
spring.datasource.poolPreparedStatements=true
spring.datasource.maxPoolPreparedStatementPerConnectionSize=20
spring.datasource.filters=stat,wall,log4j

#jpa
spring.jpa.show-sql=true
spring.data.jpa.repositories.enabled=true

#ES
es.username=
es.password=
es.mine.index=
es.mine.type=
es.public.ip=
es.private.ip=#
es.port=9200
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Eureka（kebab + camelCase 双写，避免客户端用默认 8761）
eureka.client.service-url.default-zone=http://127.0.0.1:7421/eureka/
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:7421/eureka/
eureka.instance.instance-id=${spring.application.name}:${server.port}
